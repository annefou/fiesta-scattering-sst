name: Build and Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "foscat @ git+https://github.com/annefou/FOSCAT.git@v0.1.0-cpu" healpy xarray zarr s3fs pint-xarray cf-xarray cmcrameri copernicusmarine
          pip install jupytext matplotlib numpy scipy fsspec netcdf4 nbclient ipykernel

      - name: Install MyST
        run: npm install -g mystmd

      - name: Setup Copernicus Marine credentials
        run: |
          mkdir -p ~/.copernicusmarine
          echo "[credentials]
          username=${COPERNICUSMARINE_SERVICE_USERNAME}
          password=${COPERNICUSMARINE_SERVICE_PASSWORD}" | base64 > ~/.copernicusmarine/.copernicusmarine-credentials

      - name: Execute notebook
        run: |
          jupytext --to notebook 01_sst_gap_filling.py
          jupyter execute --inplace 01_sst_gap_filling.ipynb

      - name: Build MyST site
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
